<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Velora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .page-title {
      font-family: var(--font-display);
      font-size: 2.4rem;
      margin-bottom: 0.25rem;
    }
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    /* Cart Items */
    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto auto auto;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--color-border);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item__image {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--color-surface-alt);
    }
    .cart-item__image img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item__name { font-weight: 600; font-size: var(--font-size-md); margin-bottom: 2px; }
    .cart-item__price { font-size: var(--font-size-sm); color: var(--color-text-muted); }
    .cart-item__qty {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .qty-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text-primary);
      transition: background var(--transition);
    }
    .qty-btn:hover { background: var(--color-surface-alt); }
    .qty-val { min-width: 32px; text-align: center; font-weight: 600; }
    .cart-item__subtotal { font-weight: 700; font-size: var(--font-size-md); color: var(--color-primary); min-width: 70px; text-align: right; }
    .cart-item__remove {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .cart-item__remove:hover { background: var(--color-error-bg); color: var(--color-error); }

    /* Cart Summary Card */
    .cart-summary {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2rem;
    }
    .summary-title { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 1.5rem; }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0 0;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--color-text-primary);
      border-top: 2px solid var(--color-primary);
      margin-top: 0.5rem;
    }
    .summary-total span:last-child { color: var(--color-primary); }
    .shipping-note { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: 0.75rem; text-align: center; }

    @media (max-width: 767px) {
      .cart-item { grid-template-columns: 64px 1fr; }
      .cart-item__qty, .cart-item__subtotal, .cart-item__remove { grid-column: 2; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="container">
      <div style="padding: 2.5rem 0 0;">
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb__sep">/</span>
          <span>Cart</span>
        </div>
        <h1 class="page-title">Your Cart</h1>
      </div>

      <!-- Empty State -->
      <div id="cart-empty" class="empty-state" style="display:none;">
        <div class="empty-state__icon">🛒</div>
        <h3 class="empty-state__title">Your cart is empty</h3>
        <p class="empty-state__text">Looks like you haven't added anything yet.</p>
        <a href="products.html" class="btn btn-primary btn-lg">Continue Shopping</a>
      </div>

      <!-- Cart Content -->
      <div id="cart-content" class="cart-layout" style="display:none; padding: 2rem 0;">
        <div>
          <div id="cart-items"></div>
          <div style="margin-top: 1.5rem;">
            <a href="products.html" class="btn btn-ghost">← Continue Shopping</a>
          </div>
        </div>
        <aside class="cart-summary">
          <h2 class="summary-title">Order Summary</h2>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">₹0.00</span>
          </div>
          <div class="summary-row">
            <span>Tax (10%)</span>
            <span id="cart-tax">₹0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span style="color:var(--color-success); font-weight:600;">Free</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="cart-total">₹0.00</span>
          </div>
          <p class="shipping-note">🚚 Free shipping on orders over ₹1,999</p>
          <a href="checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top: 1.5rem;">
            Proceed to Checkout →
          </a>
        </aside>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCartPage);
  </script>
</body>
</html>
