<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Velora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .confirm-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }
    .confirm-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 3.5rem;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .confirm-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      animation: confirmCircle 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .confirm-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      color: var(--color-primary);
      margin-bottom: 0.75rem;
    }
    .confirm-subtitle { font-size: 1.05rem; color: var(--color-text-secondary); margin-bottom: 2rem; line-height: 1.7; }
    .confirm-order-num {
      background: var(--color-success-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
    }
    .confirm-order-num p { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-bottom: 4px; }
    .confirm-order-num span { font-weight: 700; font-size: 1.1rem; color: var(--color-primary); letter-spacing: 0.06em; }
    .confirm-steps {
      display: flex;
      justify-content: space-around;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .confirm-step__icon { font-size: 1.6rem; margin-bottom: 0.35rem; }
    .confirm-step__label { font-size: 0.75rem; color: var(--color-text-muted); font-weight: 500; }
    .confirm-actions { display: flex; flex-direction: column; gap: 0.75rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="confirm-page">
      <div class="confirm-card">
        <div class="confirm-icon">
          <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="48" cy="48" r="46" fill="#E1F5EE" stroke="#0F6E56" stroke-width="4"/>
            <path class="confirm-check" d="M24 50 L40 66 L72 34" stroke="#0F6E56" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="100" stroke-dashoffset="0"/>
          </svg>
        </div>
        <h1 class="confirm-title">Order Confirmed!</h1>
        <p class="confirm-subtitle">Thank you for shopping with Velora. Your order is on its way — we'll send tracking info to your email shortly.</p>

        <div class="confirm-order-num">
          <p>Order Number</p>
          <span id="order-number">VLR-000000</span>
        </div>

        <div class="confirm-steps">
          <div>
            <div class="confirm-step__icon">✅</div>
            <div class="confirm-step__label">Confirmed</div>
          </div>
          <div>
            <div class="confirm-step__icon">📦</div>
            <div class="confirm-step__label">Packing</div>
          </div>
          <div>
            <div class="confirm-step__icon">🚚</div>
            <div class="confirm-step__label">Shipping</div>
          </div>
          <div>
            <div class="confirm-step__icon">🏠</div>
            <div class="confirm-step__label">Delivered</div>
          </div>
        </div>

        <div class="confirm-actions">
          <a href="products.html" class="btn btn-primary btn-lg">Continue Shopping</a>
          <a href="index.html" class="btn btn-ghost">Return to Home</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script>
    /* Generate a fake order number */
    document.addEventListener('DOMContentLoaded', () => {
      const orderNum = 'VLR-' + Math.floor(100000 + Math.random() * 900000);
      const el = document.getElementById('order-number');
      if (el) el.textContent = orderNum;
    });
  </script>
</body>
</html>
